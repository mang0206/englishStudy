<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[데모] AI 회화 프롬프트</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{demo/fragments/navbar :: navbar('study')}"></nav>

<div class="app">
    <div class="prompt-screen">

        <div class="prompt-card">
            <div class="prompt-card-header">
                <span>파트 1 — 오늘 배운 표현 써먹기</span>
                <button class="btn small" onclick="copyPrompt('part1')">복사하기</button>
            </div>
            <div class="prompt-card-body" id="part1"></div>
        </div>

        <div class="prompt-card">
            <div class="prompt-card-header">
                <span>파트 2 — 자유 대화</span>
                <button class="btn small" onclick="copyPrompt('part2')">복사하기</button>
            </div>
            <div class="prompt-card-body" id="part2"></div>
        </div>

        <div style="display:flex; justify-content:center; gap:8px; margin-top:8px;">
            <a href="/demo/tracker" class="btn">관리 탭으로 →</a>
            <button class="btn" onclick="startNewStudy()">새 학습 시작</button>
        </div>

    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/timer.js}"></script>
<script th:src="@{/js/demo-data.js}"></script>
<script th:src="@{/js/demo-prompt.js}"></script>
</body>
</html>
