<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[데모] 관리</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{demo/fragments/navbar :: navbar('tracker')}"></nav>

<div class="app">
    <div class="tracker-app">

        <div class="header">
            <div class="date-nav">
                <span class="date-label">
                    <span th:text="${#temporals.format(date, 'MM/dd')}">05/31</span>
                    <span class="notice" style="margin-left:6px;">데모</span>
                </span>
            </div>
        </div>

        <div class="progress-bar-wrap">
            <div class="progress-bar" style="width:0%"></div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">완료</div>
                <div class="stat-val" id="statDone">0 / 0</div>
            </div>
            <div class="stat">
                <div class="stat-label">학습 시간</div>
                <div class="stat-val" id="statTime">0분</div>
            </div>
            <div class="stat">
                <div class="stat-label">연속 학습</div>
                <div class="stat-val" id="statStreak">0일</div>
            </div>
        </div>

        <div class="blocks" id="blocks"></div>

        <div class="week-section">
            <div class="week-title">이번 주</div>
            <div class="week-grid" id="weekGrid"></div>
        </div>

    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/demo-data.js}"></script>
<script th:src="@{/js/demo-tracker.js}"></script>
</body>
</html>
