<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 영어 학습 트래커</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-wrap {
            max-width: 360px; margin: 6rem auto; padding: 2rem;
            background: var(--bg); border: 0.5px solid var(--border);
            border-radius: var(--radius-lg); text-align: center;
        }
        .login-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .login-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
        .login-input {
            width: 100%; height: 40px; padding: 0 12px; margin-bottom: 12px;
            border: 0.5px solid var(--border); border-radius: var(--radius);
            background: var(--bg-secondary); color: var(--text);
            font-size: 14px; font-family: inherit; outline: none; box-sizing: border-box;
        }
        .login-error { font-size: 12px; color: #E24B4A; margin-bottom: 12px; }
        .login-demo { font-size: 12px; color: var(--text-muted); margin-top: 16px; }
        .login-demo a { color: var(--accent); }
    </style>
</head>
<body>
<div class="app">
    <div class="login-wrap">
        <div class="login-title">📚 영어 학습 트래커</div>
        <div class="login-sub">접속하려면 비밀번호를 입력하세요</div>

        <form method="post" th:action="@{/login}">
            <input type="password" name="password" class="login-input"
                   placeholder="비밀번호" autofocus required>
            <div class="login-error" th:if="${error}" th:text="${error}"></div>
            <button type="submit" class="btn primary" style="width:100%;">입장</button>
        </form>

        <div class="login-demo">
            로그인 없이 둘러보려면 <a th:href="@{/demo}">데모 보기 →</a>
        </div>
    </div>
</div>
</body>
</html>
