<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 회화 프롬프트 - 영어 학습 트래커</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar('study')}"></nav>

<div class="app">
<div class="prompt-screen">

    <div class="prompt-card">
        <div class="prompt-card-header">
            <span>파트 1 — 오늘 배운 표현 써먹기</span>
            <button class="btn small" onclick="copyPrompt('part1')">복사하기</button>
        </div>
        <div class="prompt-card-body" id="part1"></div>
    </div>

    <div class="prompt-card">
        <div class="prompt-card-header">
            <span>파트 2 — 자유 대화</span>
            <button class="btn small" onclick="copyPrompt('part2')">복사하기</button>
        </div>
        <div class="prompt-card-body" id="part2"></div>
    </div>

    <div style="display:flex; justify-content:center; gap:8px; margin-top:8px;">
        <a href="/" class="btn">관리 탭으로 →</a>
        <button class="btn" onclick="startNewStudy()">새 학습 시작</button>
    </div>

</div>
</div>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/prompt.js}"></script>
<script th:src="@{/js/timer.js}"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        StudyTimer.commitAndReset().then(() => {
            console.log('[StudyTimer] 학습 시간이 저장되었습니다.');
        });

        // 학습 단계 = PROMPT 로 기록 (다른 탭 갔다 와도 prompt 페이지로 복귀)
        const raw = sessionStorage.getItem('studyState');
        const state = raw ? JSON.parse(raw) : {};
        state.stage = 'PROMPT';
        sessionStorage.setItem('studyState', JSON.stringify(state));
    });

    // "새 학습 시작" 클릭 시에만 학습 상태 + 세션 데이터 모두 초기화
    function startNewStudy() {
        sessionStorage.clear();
        sessionStorage.setItem('studyState.cleared', 'true');
        location.href = '/study';
    }
</script>
</body>
</html>
